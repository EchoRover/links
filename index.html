    <script>
        // HIDE-MODE toggle — only revealed when scrolled to the bottom
        (function () {
            const btn = document.getElementById('play-toggle');
            if (!btn) return;
            btn.addEventListener('click', () => {
                const on = document.body.classList.toggle('play-mode');
                btn.setAttribute('aria-pressed', String(on));
                const label = btn.querySelector('.play-toggle-label');
                if (label) label.textContent = on ? 'show' : 'hide';
            });

            // Show button only when near the page bottom (within 80px)
            function check() {
                const nearBottom = (window.innerHeight + window.scrollY) >= (document.documentElement.scrollHeight - 80);
                btn.classList.toggle('visible', nearBottom || document.body.classList.contains('play-mode'));
            }
            window.addEventListener('scroll', check, { passive: true });
            window.addEventListener('resize', check);
            check();
        })();

        // INTERACTIVE DOTS — tethered to circuit paths, react to cursor.
        // Move along path → snap toward cursor if near → rope breaks if pulled
        // too far → drift free → re-attach to nearest path point after a beat.
        (function () {
            const canvas = document.getElementById('dots');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const svg = document.querySelector('.circuit-top');
            const paths = ['#cb1','#cb2','#cb3','#cb4','#cb5','#cb6']
                .map(id => svg && svg.querySelector(id))
                .filter(Boolean);
            if (!paths.length) return;

            const pathLengths = paths.map(p => p.getTotalLength());
            const PULL = 90;      // cursor influence radius (modest)
            const TETHER = 140;   // rope-break distance (hard to break)
            const FREE_MAX = 60;  // frames before re-attaching to a path
            const DOT_COUNT = 18;

            let dpr = 1, W = 0, H = 0;
            const mouse = { x: -1e4, y: -1e4, active: false };
            const dots = [];

            function fit() {
                dpr = Math.min(window.devicePixelRatio || 1, 2);
                W = window.innerWidth;
                H = window.innerHeight;
                canvas.width = W * dpr;
                canvas.height = H * dpr;
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }

            // Map a point from SVG viewBox space to screen coords
            function pointAtT(pathIdx, t) {
                const p = paths[pathIdx];
                const len = pathLengths[pathIdx];
                const svgPt = p.getPointAtLength(t * len);
                const m = p.getScreenCTM();
                if (!m) return { x: svgPt.x, y: svgPt.y };
                return { x: svgPt.x * m.a + m.e, y: svgPt.y * m.d + m.f };
            }

            function spawn() {
                dots.length = 0;
                for (let i = 0; i < DOT_COUNT; i++) {
                    const pi = i % paths.length;
                    const t = Math.random();
                    const p = pointAtT(pi, t);
                    dots.push({
                        pi, t,
                        x: p.x, y: p.y,
                        vx: 0, vy: 0,
                        speed: 0.0006 + Math.random() * 0.0006,
                        dir: Math.random() < 0.5 ? 1 : -1,
                        tethered: true,
                        free: 0,
                        size: 2.8 + Math.random() * 1.5,
                    });
                }
            }

            function rgbFromVar(name, fallback) {
                const v = getComputedStyle(document.documentElement)
                    .getPropertyValue(name).trim();
                return v || fallback;
            }

            function step() {
                ctx.clearRect(0, 0, W, H);
                const tetherColor = rgbFromVar('--coral', '#3B5C9C');
                const freeColor = tetherColor;
                const ropeColor = 'rgba(120, 130, 170, 0.20)';

                for (const d of dots) {
                    if (d.tethered) {
                        // step along path
                        d.t += d.speed * d.dir;
                        if (d.t > 1) d.t -= 1;
                        if (d.t < 0) d.t += 1;
                        const tgt = pointAtT(d.pi, d.t);

                        // strong attraction to path target — dots stick to path
                        let ax = (tgt.x - d.x) * 0.32;
                        let ay = (tgt.y - d.y) * 0.32;

                        // light cursor attraction
                        if (mouse.active) {
                            const dx = mouse.x - d.x, dy = mouse.y - d.y;
                            const dm = Math.sqrt(dx * dx + dy * dy);
                            if (dm < PULL && dm > 0.1) {
                                const f = (1 - dm / PULL) * 0.5;
                                ax += (dx / dm) * f * 2.5;
                                ay += (dy / dm) * f * 2.5;
                            }
                        }

                        d.vx = (d.vx + ax) * 0.74;
                        d.vy = (d.vy + ay) * 0.74;
                        d.x += d.vx;
                        d.y += d.vy;

                        const stretch = Math.hypot(d.x - tgt.x, d.y - tgt.y);
                        // rope breaks
                        if (stretch > TETHER) {
                            d.tethered = false;
                            d.free = 0;
                            // give a small kick in the cursor direction
                            if (mouse.active) {
                                const dx = d.x - mouse.x, dy = d.y - mouse.y;
                                const dm = Math.hypot(dx, dy) || 1;
                                d.vx = (dx / dm) * 6;
                                d.vy = (dy / dm) * 6;
                            }
                        }
                    } else {
                        // free drift with momentum
                        d.vx *= 0.985;
                        d.vy *= 0.985;
                        d.x += d.vx;
                        d.y += d.vy;
                        d.free++;
                        // wrap around viewport edges
                        if (d.x < -30) d.x = W + 30;
                        if (d.x > W + 30) d.x = -30;
                        if (d.y < -30) d.y = H + 30;
                        if (d.y > H + 30) d.y = -30;

                        if (d.free > FREE_MAX) {
                            // find nearest path point and re-attach
                            let best = { pi: 0, t: 0, dist: Infinity };
                            for (let i = 0; i < paths.length; i++) {
                                for (let s = 0; s <= 1; s += 0.04) {
                                    const pt = pointAtT(i, s);
                                    const dx = pt.x - d.x, dy = pt.y - d.y;
                                    const dd = dx * dx + dy * dy;
                                    if (dd < best.dist) {
                                        best = { pi: i, t: s, dist: dd };
                                    }
                                }
                            }
                            d.pi = best.pi;
                            d.t = best.t;
                            d.tethered = true;
                            d.dir = Math.random() < 0.5 ? 1 : -1;
                        }
                    }

                    // draw the dot with a soft halo so it shows above the wires
                    ctx.globalAlpha = d.tethered ? 0.25 : 0.4;
                    ctx.fillStyle = d.tethered ? tetherColor : freeColor;
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.size * 2.2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = d.tethered ? 0.95 : 1;
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
                requestAnimationFrame(step);
            }

            window.addEventListener('pointermove', (e) => {
                mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true;
            }, { passive: true });
            window.addEventListener('pointerleave', () => { mouse.active = false; });
            window.addEventListener('resize', () => { fit(); spawn(); });

            // Wait for SVG paths to lay out before spawning
            requestAnimationFrame(() => {
                fit();
                spawn();
                requestAnimationFrame(step);
            });
        })();

        // Cursor → CSS vars (ambient glow follows you)
        (function () {
            const root = document.documentElement;
            let raf = 0, tx = 50, ty = 30, cx = tx, cy = ty;
            root.style.setProperty('--mx', cx + '%');
            root.style.setProperty('--my', cy + '%');
            const tick = () => {
                cx += (tx - cx) * 0.12;
                cy += (ty - cy) * 0.12;
                root.style.setProperty('--mx', cx + '%');
                root.style.setProperty('--my', cy + '%');
                if (Math.abs(tx - cx) > 0.1 || Math.abs(ty - cy) > 0.1) raf = requestAnimationFrame(tick);
                else raf = 0;
            };
            window.addEventListener('pointermove', (e) => {
                tx = (e.clientX / window.innerWidth) * 100;
                ty = (e.clientY / window.innerHeight) * 100;
                if (!raf) raf = requestAnimationFrame(tick);
            }, { passive: true });
        })();

        // Theme toggle
        (function () {
            const btn = document.getElementById('theme-toggle');
            if (!btn) return;
            btn.addEventListener('click', () => {
                const cur = document.documentElement.getAttribute('data-theme');
                const next = cur === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
            });
        })();

        // More-toggle — expand/collapse the secondary quick links
        (function () {
            const btn = document.getElementById('more-toggle');
            const sec = document.getElementById('quick-secondary');
            if (!btn || !sec) return;
            btn.addEventListener('click', () => {
                const expanded = btn.getAttribute('aria-expanded') === 'true';
                btn.setAttribute('aria-expanded', String(!expanded));
                sec.setAttribute('aria-hidden', String(expanded));
                sec.classList.toggle('open');
                const label = btn.querySelector('.util-more-label');
                if (label) label.textContent = expanded ? '+ more' : '× hide';
            });
        })();

        // LINKEEN pill — tap-toggle the popup on touch devices
        (function () {
            const el = document.getElementById('pill-linkeen');
            if (!el) return;
            const isTouch = window.matchMedia('(hover: none)').matches;
            if (!isTouch) return;
            el.addEventListener('click', (e) => {
                if (!el.classList.contains('show-popup')) {
                    e.preventDefault();
                    el.classList.add('show-popup');
                    setTimeout(() => el.classList.remove('show-popup'), 3000);
                }
            });
        })();

        // Equalize ALL course box heights (tallest sets the height for everyone).
        (function () {
            function equalize() {
                const boxes = Array.from(document.querySelectorAll('.course-list .box'));
                if (!boxes.length) return;
                boxes.forEach(b => { b.style.height = 'auto'; });
                requestAnimationFrame(() => {
                    const maxH = Math.max(...boxes.map(b => b.offsetHeight));
                    boxes.forEach(b => { b.style.height = maxH + 'px'; });
                });
            }
            window.addEventListener('load', equalize);
            window.addEventListener('resize', () => {
                clearTimeout(window._eqT);
                window._eqT = setTimeout(equalize, 120);
            });
        })();
    </script>
    <script src="scripts.js"></script>
